<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" />
    <title>Threadloom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Inter:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="chat-column">
        <header class="topbar">
          <div class="brand-block">
            <h1>Threadloom</h1>
            <p class="brand-subtitle">The Living Manuscript</p>
          </div>
          <div class="topbar-actions">
            <div class="session-dock-wrap topbar-session-dock">
              <button id="sessionIndicator" class="session-pill session-indicator-trigger" type="button" aria-expanded="false" aria-controls="sessionDockPanel">
                <span id="sessionIndicatorLabel" class="session-indicator-label">story-live</span>
                <span class="material-symbols-outlined session-indicator-chevron" aria-hidden="true">expand_more</span>
              </button>
              <div id="sessionDockPanel" class="session-dock-panel" hidden>
                <div id="sessionDockList" class="session-dock-list"></div>
              </div>
            </div>
        <button id="settingsBtn" class="icon-btn settings-icon-btn" type="button" aria-haspopup="dialog" aria-controls="settingsPanel" aria-expanded="false" aria-label="打开设置">
          <span class="material-symbols-outlined">settings</span>
        </button>
      </div>
        </header>
        <section id="messages" class="messages"></section>
        <form id="composer" class="composer">
          <div class="composer-shell">
            <textarea id="input" placeholder="输入消息..." rows="3"></textarea>
            <div class="composer-footer">
              <div id="statusBar" class="status-bar">就绪</div>
              <div class="composer-actions">
                <button id="regenerateBtn" type="button" hidden>重新生成上一条</button>
                <button type="submit">发送</button>
              </div>
            </div>
          </div>
        </form>
      </main>
      <aside id="stateColumn" class="state-column">
        <section class="card character-card">
          <div class="character-cover-wrap">
            <img id="characterCover" class="character-cover" alt="角色卡封面" hidden />
            <div id="characterCoverFallback" class="character-cover-fallback">TL</div>
          </div>
          <div class="character-copy">
            <p class="character-label">Character Card</p>
            <h2 id="characterName" class="character-name">未命名角色卡</h2>
            <p id="characterSubtitle" class="character-subtitle">待加载</p>
          </div>
        </section>
        <section class="card">
          <h2>当前状态</h2>
          <div id="state"></div>
        </section>
        <section class="card">
          <h2>NPC 详情</h2>
          <div id="entityDetail">点击右侧状态里的 NPC 名称查看</div>
        </section>
        <section class="card debug-card">
          <details id="debugPanel" hidden>
            <summary>调试诊断</summary>
            <div id="debugDetail">发送一轮消息后显示</div>
          </details>
        </section>
      </aside>
    </div>

    <div id="settingsBackdrop" class="settings-backdrop" hidden></div>
    <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
      <div class="settings-header">
        <div>
          <p class="settings-kicker">Config</p>
          <h2>模型与站点</h2>
        </div>
        <button id="settingsCloseBtn" class="icon-btn subtle" type="button" aria-label="关闭设置">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="settings-body">
        <section class="settings-section">
          <div class="settings-stack">
            <section class="settings-subsection">
              <h3>站点配置</h3>
              <div class="config-grid">
                <label class="field field-wide">
                  <span>URL</span>
                  <input id="siteBaseUrlInput" type="url" placeholder="https://your-provider.example/v1" />
                </label>
                <label class="field">
                  <span>API 类型</span>
                  <select id="siteApiTypeSelect"></select>
                </label>
                <label class="field">
                  <span>API Key</span>
                  <input id="siteApiKeyInput" type="password" placeholder="留空表示保持不变" />
                </label>
              </div>
              <div class="settings-actions">
                <button id="discoverSiteModelsBtn" type="button" class="subtle-btn">获取模型</button>
                <button id="saveSiteConfigBtn" type="button">保存站点</button>
              </div>
              <div id="siteStatusNote" class="inline-feedback"></div>
            </section>

            <section class="settings-subsection">
              <h3>模型选择</h3>
              <div class="config-grid">
                <label class="field">
                  <span>Narrator</span>
                  <select id="narratorModelSelect"></select>
                </label>
                <label class="field">
                  <span>State Keeper</span>
                  <select id="stateKeeperModelSelect"></select>
                </label>
              </div>
              <div id="modelConfigNote" class="inline-feedback">温度和最大输出长度已固定到默认配置，由管理员维护。</div>
            </section>

            <div class="settings-actions">
              <button id="saveModelConfigBtn" type="button">保存模型配置</button>
            </div>
          </div>
        </section>
      </div>
    </aside>

    <script src="/app.js"></script>
  </body>
</html>
