<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Threadloom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Inter:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="chat-column">
        <header class="topbar">
          <div class="brand-block">
            <h1>Threadloom</h1>
            <p class="brand-subtitle">The Living Manuscript</p>
          </div>
          <div class="topbar-actions">
            <div class="session-pill" id="sessionIndicator">story-live</div>
            <button id="settingsBtn" class="icon-btn" type="button" aria-haspopup="dialog" aria-controls="settingsPanel" aria-expanded="false">
              <span class="material-symbols-outlined">settings</span>
              <span>设置</span>
            </button>
          </div>
        </header>
        <section id="messages" class="messages"></section>
        <form id="composer" class="composer">
          <div class="composer-shell">
            <textarea id="input" placeholder="输入消息..." rows="3"></textarea>
            <div class="composer-footer">
              <div id="statusBar" class="status-bar">就绪</div>
              <div class="composer-actions">
                <button id="regenerateBtn" type="button" hidden>重新生成上一条</button>
                <button type="submit">发送</button>
              </div>
            </div>
          </div>
        </form>
      </main>
      <aside id="stateColumn" class="state-column">
        <section class="card character-card">
          <div class="character-cover-wrap">
            <img id="characterCover" class="character-cover" alt="角色卡封面" hidden />
            <div id="characterCoverFallback" class="character-cover-fallback">TL</div>
          </div>
          <div class="character-copy">
            <p class="character-label">Character Card</p>
            <h2 id="characterName" class="character-name">未命名角色卡</h2>
            <p id="characterSubtitle" class="character-subtitle">待加载</p>
          </div>
        </section>
        <section class="card">
          <h2>当前状态</h2>
          <div id="state"></div>
        </section>
        <section class="card">
          <h2>NPC 详情</h2>
          <div id="entityDetail">点击右侧状态里的 NPC 名称查看</div>
        </section>
        <section class="card debug-card">
          <details id="debugPanel" hidden>
            <summary>调试诊断</summary>
            <div id="debugDetail">发送一轮消息后显示</div>
          </details>
        </section>
      </aside>
    </div>

    <div id="settingsBackdrop" class="settings-backdrop" hidden></div>
    <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
      <div class="settings-header">
        <div>
          <p class="settings-kicker">Settings</p>
          <h2>设置与存档</h2>
        </div>
        <button id="settingsCloseBtn" class="icon-btn subtle" type="button" aria-label="关闭设置">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="settings-body">
        <section class="settings-section">
          <h3>会话管理</h3>
          <div class="session-bar session-bar-panel">
            <label for="sessionId">Session</label>
            <input id="sessionId" value="story-live" />
            <select id="sessionList"></select>
          </div>
          <div class="settings-actions">
            <button id="reloadBtn" type="button">刷新</button>
            <button id="newGameBtn" type="button">开始新游戏</button>
            <button id="deleteSessionBtn" type="button" class="danger-btn">删除当前</button>
          </div>
        </section>

        <section class="settings-section muted-section">
          <h3>模型与运行</h3>
          <p>此区先保留布局入口。LLM 管理后续按现有运行链逐步接入，不在本次改动中做完整实现。</p>
        </section>
      </div>
    </aside>

    <script src="/app.js"></script>
  </body>
</html>
